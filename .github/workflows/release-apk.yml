name: Release APK

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "APK version name, for example 1.0.0"
        required: true

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          UMENG_APP_KEY: ${{ secrets.UMENG_APP_KEY }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$UMENG_APP_KEY"

      - name: Restore release signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode --ignore-garbage > "$RUNNER_TEMP/voicedrop-release.jks"
          test -s "$RUNNER_TEMP/voicedrop-release.jks"
          chmod 600 "$RUNNER_TEMP/voicedrop-release.jks"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/voicedrop-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          UMENG_APP_KEY: ${{ secrets.UMENG_APP_KEY }}
          UMENG_CHANNEL: github
        run: ./gradlew --no-daemon assembleRelease

      - name: Prepare APK file
        id: apk
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG:-${INPUT_VERSION:-$REF_NAME}}"
          VERSION="${VERSION#v}"
          APK_NAME="voicedrop-${VERSION}.apk"

          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          printf 'name=%s\n' "$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}

      - name: Upload APK to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
          APK_NAME: ${{ steps.apk.outputs.name }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG:-$REF_NAME}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            PRERELEASE_FLAG=""
            case "$TAG" in
              *-ci-*|*-beta*|*-rc*) PRERELEASE_FLAG="--prerelease" ;;
            esac
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG" $PRERELEASE_FLAG
          fi

          gh release upload "$TAG" "$APK_NAME" --clobber
